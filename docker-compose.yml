version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ats-resume-screening:latest
    container_name: ats_screening_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/usr/src/app/data
    restart: unless-stopped
